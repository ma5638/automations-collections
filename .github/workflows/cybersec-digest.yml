name: Daily Cybersecurity Digest

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (8am ET / 7am CT)
  workflow_dispatch:        # run manually from GitHub UI anytime

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests anthropic

      - name: Message 1 — RSS Feed Digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/cybersec_digest.py

      - name: Message 2 — Claude AI Threat Briefing
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_KEY }}
        run: python scripts/claude_digest.py
