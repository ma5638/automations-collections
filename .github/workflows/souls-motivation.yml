name: Souls-like Motivation

on:
  schedule:
    - cron: "0 16 */2 * *"   # every 2 days at 16:00 UTC = 8:00pm GMT+4
  workflow_dispatch:

jobs:
  souls-motivation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic python-dotenv

      - name: Send Souls Motivation
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_KEY }}
        run: python scripts/souls_motivation.py
