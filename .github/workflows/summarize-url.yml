name: Summarize URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Article URL to summarize"
        required: true
        type: string

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4 python-dotenv playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Summarize URL
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ARTICLE_URL: ${{ inputs.url }}
        run: python scripts/summarize_url.py "$ARTICLE_URL"
